<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-gray-800 rounded-2xl shadow-xl p-6 border border-gray-700">
        <h1 class="text-2xl font-bold text-center mb-6 text-emerald-400">🥗 KI Nährwert Tracker</h1>
        
        <div class="space-y-4">
            <div>
                <label for="foodInput" class="block text-sm font-medium text-gray-400 mb-1">Was hast du gegessen?</label>
                <input type="text" id="foodInput" placeholder="z.B. 200g Hähnchenbrust mit 100g Reis" 
                       class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg focus:outline-none focus:border-emerald-500 text-white placeholder-gray-500">
            </div>
            
            <button id="submitBtn" onclick="trackMeal()" 
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 disabled:opacity-50">
                Mahlzeit analysieren
            </button>
        </div>

        <div id="loading" class="hidden text-center my-4 text-gray-400 animate-pulse">
            KI berechnet Nährwerte...
        </div>

        <div id="errorMessage" class="hidden mt-4 p-3 bg-red-900/50 border border-red-500 text-red-200 rounded-lg text-sm"></div>

        <div id="resultDashboard" class="hidden mt-6 pt-6 border-t border-gray-700 grid grid-cols-2 gap-4">
            <div class="bg-gray-750 p-3 rounded-lg border border-gray-700 text-center col-span-2">
                <span class="block text-xs uppercase tracking-wider text-gray-400">Kalorien</span>
                <span id="valKcal" class="text-3xl font-bold text-emerald-400">0</span> <span class="text-gray-400 text-sm">kcal</span>
            </div>
            <div class="bg-gray-750 p-3 rounded-lg border border-gray-700 text-center">
                <span class="block text-xs uppercase tracking-wider text-gray-400">Protein</span>
                <span id="valProtein" class="text-xl font-bold text-blue-400">0</span> <span class="text-gray-400 text-sm">g</span>
            </div>
            <div class="bg-gray-750 p-3 rounded-lg border border-gray-700 text-center">
                <span class="block text-xs uppercase tracking-wider text-gray-400">Kohlenhydrate</span>
                <span id="valCarbs" class="text-xl font-bold text-yellow-400">0</span> <span class="text-gray-400 text-sm">g</span>
            </div>
            <div class="bg-gray-750 p-3 rounded-lg border border-gray-700 text-center col-span-2">
                <span class="block text-xs uppercase tracking-wider text-gray-400">Fett</span>
                <span id="valFat" class="text-xl font-bold text-red-400">0</span> <span class="text-gray-400 text-sm">g</span>
            </div>
        </div>
    </div>

    <script>
        async function trackMeal() {
            const foodInput = document.getElementById('foodInput');
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            const resultDashboard = document.getElementById('resultDashboard');

            const foodText = foodInput.value.trim();
            if (!foodText) return;

            // UI Reset
            submitBtn.disabled = true;
            loading.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            resultDashboard.classList.add('hidden');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ meal: foodText })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `Server meldet Fehler ${response.status}`);
                }

                // Werte in das Dashboard eintragen
                document.getElementById('valKcal').innerText = data.kcal ?? 0;
                document.getElementById('valProtein').innerText = data.protein ?? 0;
                document.getElementById('valCarbs').innerText = data.carbs ?? 0;
                document.getElementById('valFat').innerText = data.fat ?? 0;

                // Dashboard anzeigen
                resultDashboard.classList.remove('hidden');
                foodInput.value = ''; // Input leeren bei Erfolg

            } catch (error) {
                console.error("Tracking Error:", error);
                errorMessage.innerText = error.message;
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
